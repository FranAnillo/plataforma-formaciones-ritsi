services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: plataforma_formativa_ritsi
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  scripts:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: plataforma_formativa_ritsi
      PYTHONPATH: /app
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app
    restart: "no"
    profiles:
      - tools

volumes:
  mongo_data:
